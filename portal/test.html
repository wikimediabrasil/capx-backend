<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Teste FormBuilder → FormRender</title>

    <script src="https://tools-static.wmflabs.org/cdnjs/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://tools-static.wmflabs.org/cdnjs/ajax/libs/jqueryui/1.14.1/jquery-ui.min.js"></script>
    <script src="https://tools-static.wmflabs.org/cdnjs/ajax/libs/jQuery-formBuilder/3.21.1/form-render.min.js"></script>
    <script src="https://tools-static.wmflabs.org/cdnjs/ajax/libs/jQuery-formBuilder/3.21.1/form-builder.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f4f6f9;
    }

    textarea {
      width: 100%;
      height: 200px;
      font-family: monospace;
      padding: 10px;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      cursor: pointer;
    }

    #form-container {
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    #output {
      margin-top: 20px;
      background: #1e1e1e;
      color: #00ff88;
      padding: 15px;
      white-space: pre-wrap;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h2>Teste de Renderização de Formulário</h2>

  <p>Cole abaixo o JSON gerado pelo formBuilder:</p>

  <textarea id="json-input">
[
  {
    "type": "text",
    "label": "Nome",
    "name": "nome"
  },
  {
    "type": "number",
    "label": "Idade",
    "name": "idade"
  },
  {
    "type": "textarea",
    "label": "Observações",
    "name": "obs"
  }
]
  </textarea>

  <br>
  <button id="render-btn">Renderizar Formulário</button>

  <div id="form-container"></div>

  <h3>Dados Submetidos:</h3>
  <div id="output"></div>

  <script>
    $('#render-btn').click(function () {
      const jsonData = $('#json-input').val();

      try {
        const parsedData = JSON.parse(jsonData);

        // Limpa container
        $('#form-container').html('<form id="generated-form"></form>');

        // Renderiza formulário
        $('#generated-form').formRender({
          formData: parsedData
        });

        // Adiciona botão de submit manualmente
        $('#generated-form').append('<br><button type="submit">Enviar</button>');

        // Evento de submit
        $('#generated-form').on('submit', function (e) {
          e.preventDefault();

          const formDataArray = $(this).serializeArray();

          const result = {};
          formDataArray.forEach(item => {
            result[item.name] = item.value;
          });

          $('#output').text(JSON.stringify(result, null, 2));
        });

      } catch (error) {
        alert("JSON inválido!");
        console.error(error);
      }
    });
  </script>

</body>
</html>
