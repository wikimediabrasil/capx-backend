name: Django CI

on:
  push:
    branches: [ "stable", "dev" ]
  pull_request:
    branches: [ "stable", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.10.16]
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
    - uses: getong/mariadb-action@d6d2ec41fd5588f369be4c9398ce77ee725ca9ea
      with:
        mariadb version: '10.6.21'
        mysql user: 'runner'
        mysql password: 'runner'
        mysql database: 'test'
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Create settings_local.py
      run: |
        echo "SECRET_KEY = 'SECRET_KEY'" > CapX/settings_local.py
        echo "DEBUG = True" >> CapX/settings_local.py
        echo "ALLOWED_HOSTS = ['localhost', '127.0.0.1']" >> CapX/settings_local.py
        echo "BASE_DIR = '${GITHUB_WORKSPACE}'" >> CapX/settings_local.py
        echo "DATABASES = {'default': {'ENGINE': 'django.db.backends.mysql', 'HOST': '127.0.0.1', 'NAME': 'test', 'USER': 'runner', 'PASSWORD': 'runner', 'TEST': {'NAME': 'test', 'CREATE_DB': False }}}" >> CapX/settings_local.py
        echo "LANGUAGES = (('en', 'English'),('pt', 'Portuguese'),('es', 'Spanish'),)" >> CapX/settings_local.py
        echo "SOCIAL_AUTH_MEDIAWIKI_CALLBACK = 'https://localhost:8000/oauth/complete/mediawiki/'" >> CapX/settings_local.py
        echo "SOCIAL_AUTH_MEDIAWIKI_KEY = 'key'" >> CapX/settings_local.py
        echo "SOCIAL_AUTH_MEDIAWIKI_URL = 'https://localhost:8000/w/api.php'" >> CapX/settings_local.py
        echo "SOCIAL_AUTH_MEDIAWIKI_SECRET = 'text'" >> CapX/settings_local.py
        echo "CAPX_BOT_USERNAME = 'CapXBot'" >> CapX/settings_local.py
        echo "CAPX_BOT_PASSWORD = 'password'" >> CapX/settings_local.py
        echo "EMAIL_HOST = 'localhost'" >> CapX/settings_local.py
        echo "EMAIL_PORT = 25" >> CapX/settings_local.py
        echo "SERVER_EMAIL = 'root@localhost'" >> CapX/settings_local.py
        echo "ADMINS = []" >> CapX/settings_local.py
        echo "HOME = '${GITHUB_WORKSPACE}'" >> CapX/settings_local.py
        echo "    CapX/tests/test_settings_local.py" >> .coveragerc
    - name: Coverage report
      run: |
        pip install coverage
        coverage run manage.py test --keepdb
        coverage report
        coverage xml
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  js-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
    - name: Use Node 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install JS dependencies
      run: |
        npm install
    - name: Run JS unit tests
      run: npm run test:js

  e2e-playwright:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        python-version: [3.10.16]
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        fetch-depth: 0
    - uses: getong/mariadb-action@d6d2ec41fd5588f369be4c9398ce77ee725ca9ea
      with:
        mariadb version: '10.6.21'
        mysql user: 'runner'
        mysql password: 'runner'
        mysql database: 'test'
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright
        python -m playwright install chromium
    - name: Create settings_local.py
      run: |
        echo "SECRET_KEY = 'SECRET_KEY'" > CapX/settings_local.py
        echo "DEBUG = True" >> CapX/settings_local.py
        echo "ALLOWED_HOSTS = ['localhost', '127.0.0.1']" >> CapX/settings_local.py
        echo "BASE_DIR = '${GITHUB_WORKSPACE}'" >> CapX/settings_local.py
        echo "DATABASES = {'default': {'ENGINE': 'django.db.backends.mysql', 'HOST': '127.0.0.1', 'NAME': 'test', 'USER': 'runner', 'PASSWORD': 'runner', 'TEST': {'NAME': 'test', 'CREATE_DB': False }}}" >> CapX/settings_local.py
        echo "LANGUAGES = (('en', 'English'),('pt', 'Portuguese'),('es', 'Spanish'),)" >> CapX/settings_local.py
        echo "SOCIAL_AUTH_MEDIAWIKI_CALLBACK = 'https://localhost:8000/oauth/complete/mediawiki/'" >> CapX/settings_local.py
        echo "SOCIAL_AUTH_MEDIAWIKI_KEY = 'key'" >> CapX/settings_local.py
        echo "SOCIAL_AUTH_MEDIAWIKI_URL = 'https://localhost:8000/w/api.php'" >> CapX/settings_local.py
        echo "SOCIAL_AUTH_MEDIAWIKI_SECRET = 'text'" >> CapX/settings_local.py
        echo "CAPX_BOT_USERNAME = 'CapXBot'" >> CapX/settings_local.py
        echo "CAPX_BOT_PASSWORD = 'password'" >> CapX/settings_local.py
        echo "EMAIL_HOST = 'localhost'" >> CapX/settings_local.py
        echo "EMAIL_PORT = 25" >> CapX/settings_local.py
        echo "SERVER_EMAIL = 'root@localhost'" >> CapX/settings_local.py
        echo "ADMINS = []" >> CapX/settings_local.py
        echo "HOME = '${GITHUB_WORKSPACE}'" >> CapX/settings_local.py
    - name: Run Playwright smoke tests
      env:
        DJANGO_SETTINGS_MODULE: CapX.settings
      run: |
        python manage.py migrate --noinput
        python manage.py test portal.tests.test_dashboard_smoke --keepdb
